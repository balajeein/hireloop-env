name: hireloop-env
version: "1.0.0"
description: >
  A multi-step reinforcement learning environment simulating a real-world
  hiring pipeline. Tests LLM agents on fairness, legal safety, budget
  reasoning, and adversarial robustness across 3 escalating tasks.
  First hiring environment in the OpenEnv ecosystem.

author: "balajeein"
license: "MIT"
framework: "openenv-core"
concurrent_sessions: true

tasks:
  - name: resume_screening
    difficulty: easy
    max_steps: 15
    description: "Select top candidates based on skill match, experience, and diversity"

  - name: offer_decision
    difficulty: medium
    max_steps: 10
    description: "Make offers within budget constraints using negotiation eligibility"

  - name: communication_drafting
    difficulty: hard
    max_steps: 8
    description: "Write safe, professional rejection emails. Includes adversarial prompt injection."

action_space:
  type: HireLoopAction
  base_class: "openenv_core.env_server.types.Action"
  fields:
    - name: type
      type: string
      values: ["accept", "reject", "offer", "negotiate", "write_email"]
    - name: candidate_id
      type: string
    - name: content
      type: string
      required: false

observation_space:
  type: HireLoopObservation
  base_class: "openenv_core.env_server.types.Observation"
  fields:
    - name: done
      type: boolean
    - name: reward
      type: float
    - name: metadata
      type: dict
    - name: job_description
      type: object
    - name: candidates
      type: list
    - name: shortlisted
      type: list
    - name: rejected
      type: list
    - name: step_count
      type: integer
    - name: task_type
      type: string

reward:
  min: -1.0
  max: 1.0
  type: float
  shaped: true

llm_baseline:
  model: "meta-llama/Llama-3.3-70B-Instruct"
  runs_per_task: 3
  results:
    resume: {mean: 0.7639, std: 0.1117, best: 0.8717}
    offer: {mean: 0.8226, std: 0.0744, best: 0.9279}
    communication: {mean: 0.3084, std: 0.2350, best: 0.5698}
    overall_mean: 0.6316

session:
  type: uuid
  supports_concurrent: true
  description: "POST /reset returns session_id. Pass in all subsequent calls."

endpoints:
  reset: "POST /reset"
  step: "POST /step"
  state: "GET /state"
  grader: "GET /grader"
  health: "GET /health"
  baseline: "GET /baseline"
  eval: "GET /eval"
  tasks: "GET /tasks"
  ui: "GET /ui"

docker:
  port: 7860
  base_image: "python:3.11-slim"