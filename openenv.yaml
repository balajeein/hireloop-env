name: hireloop-env
version: "1.0.0"
description: >
  A multi-step reinforcement learning environment simulating a real-world
  hiring pipeline. Tests LLM agents on fairness, legal safety, budget
  reasoning, and adversarial robustness across 3 escalating tasks.

author: "your-hf-username"
license: "MIT"

tasks:
  - name: resume_screening
    difficulty: easy
    max_steps: 15
    description: "Select top candidates based on skill match and experience"

  - name: offer_decision
    difficulty: medium
    max_steps: 10
    description: "Make offers within budget constraints"

  - name: communication_drafting
    difficulty: hard
    max_steps: 10
    description: "Write safe, professional rejection emails. Includes adversarial input."

action_space:
  type: dict
  fields:
    - name: type
      type: string
      values: ["accept", "reject", "offer", "negotiate", "write_email"]
    - name: candidate_id
      type: string
    - name: content
      type: string
      required: false
    - name: negotiated_salary
      type: integer
      required: false

observation_space:
  type: dict
  fields:
    - name: job_description
      type: object
    - name: candidates
      type: list
    - name: shortlisted
      type: list
    - name: rejected
      type: list
    - name: step_count
      type: integer
    - name: task_type
      type: string

reward:
  min: -1.0
  max: 1.0
  type: float
  shaped: true

endpoints:
  reset: "POST /reset"
  step: "POST /step"
  state: "GET /state"
  grader: "GET /grader"
  health: "GET /health"
  baseline: "GET /baseline"
  eval: "GET /eval"
  tasks: "GET /tasks"
  ui: "GET /ui"

session:
  type: uuid
  header: session_id
  description: "Each /reset call returns a session_id. Pass it in all subsequent /step, /state, /grader calls."

docker:
  port: 7860
  base_image: "python:3.10"